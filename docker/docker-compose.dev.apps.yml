services:
  app_database:
    image: postgres:18.2
    env_file: ../.env
    environment:
      POSTGRES_USER: ${DATABASE_USER:-app_db}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-app_db}
      POSTGRES_DB: ${DATABASE_NAME:-app_db}
    volumes:
      - app_database_data:/var/lib/postgresql
    ports:
      - "${DATABASE_EXTERNAL_PORT:-15989}:${DATABASE_PORT:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app_api_database_migrations:
    image: node:24-alpine
    working_dir: /workspace
    env_file: ../.env
    volumes:
      - ../:/workspace
    command:
      [
        "sh",
        "-c",
        "npm i -g pnpm && corepack enable && pnpm --dir apps/api prisma:generate && pnpm --dir apps/api prisma:migrate",
      ]
    depends_on:
      app_database:
        condition: service_healthy

  app_api:
    image: node:24-alpine
    working_dir: /workspace
    env_file: ../.env
    volumes:
      - ../:/workspace
    command:
      [
        "sh",
        "-c",
        "npm i -g pnpm && corepack enable && pnpm --dir apps/api dev",
      ]
    ports:
      - "${API_PORT:-15988}:${API_PORT:-15988}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider --no-verbose --tries=1 ${API_INTERNAL_URL:-http://app_api:15988}/v1/internal/public/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      app_database:
        condition: service_healthy

  app_web:
    image: node:24-alpine
    working_dir: /workspace
    env_file: ../.env
    volumes:
      - ../:/workspace
    command:
      [
        "sh",
        "-c",
        "npm i -g pnpm && corepack enable && pnpm --dir apps/web dev",
      ]
    ports:
      - "${WEB_PORT:-15987}:${WEB_PORT:-15987}"
    depends_on:
      app_api:
        condition: service_healthy

volumes:
  app_database_data:
