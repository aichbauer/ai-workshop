services:
  app_database:
    image: postgres:18.2
    env_file: ../.env
    environment:
      POSTGRES_USER: ${DATABASE_USER:-app_db}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-app_db}
      POSTGRES_DB: ${DATABASE_NAME:-app_db}
    volumes:
      - app_database_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app_api_database_migrations:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.migrations
    env_file: ../.env
    depends_on:
      app_database:
        condition: service_healthy

  app_api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-15988}
      PORT: ${API_PORT:-15988}
      DATABASE_URL: ${DATABASE_URL}
      CI: "true"
    expose:
      - "${API_PORT:-15988}"
    healthcheck:
      test:
        - "CMD"
        - "/nodejs/bin/node"
        - "-e"
        - "fetch('http://127.0.0.1:' + (process.env.PORT || '15988') + '/v1/internal/public/health').then((response) => { if (!response.ok) { process.exit(1); } }).catch(() => process.exit(1));"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      app_database:
        condition: service_healthy

  app_web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_ORIGIN: ${NEXT_PUBLIC_APP_ORIGIN}
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      WEB_PORT: ${WEB_PORT:-15987}
      PORT: ${WEB_PORT:-15987}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_ORIGIN: ${NEXT_PUBLIC_APP_ORIGIN}
      CI: "true"
    expose:
      - "${WEB_PORT:-15987}"
    depends_on:
      app_api:
        condition: service_healthy

volumes:
  app_database_data:
