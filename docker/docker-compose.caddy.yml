services:
  caddy:
    image: caddy:2-alpine
    env_file:
      - ../.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app_api
      - app_web

volumes:
  caddy_data:
  caddy_config:
