services:
  app_test_database:
    image: postgres:18.2
    environment:
      POSTGRES_USER: ${DATABASE_USER:-app_test}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-app_test}
      POSTGRES_DB: ${DATABASE_NAME:-app_test}
    ports:
      - "${DATABASE_PORT:-15989}:5432"
    volumes:
      - app_test_database_data:/var/lib/postgresql
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-app_test} -d ${DATABASE_NAME:-app_test}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  app_test_database_data:
